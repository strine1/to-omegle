<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-omegle | المنصة العالمية الذكية</title>
    
    <!-- خط الكساندرا (Alexandria) من قوقل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f111a;
            --container-bg: #1a1f36;
            --border-color: #2e3856;
            --text-color: #ffffff;
            --text-muted: #8892b0;
            --primary-color: #00ffcc;
            --danger-color: #ff4a4a;
            --success-color: #00ff66;
            --info-color: #00bfff;
            --chat-bg: #111424;
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --border-color: #e4e6eb;
            --text-color: #050505;
            --text-muted: #65676b;
            --primary-color: #0084ff;
            --chat-bg: #f5f6f7;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Alexandria', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background 0.3s; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background-color: var(--container-bg); border-bottom: 1px solid var(--border-color); z-index: 10; }
        h1 { font-size: 22px; color: var(--primary-color); font-weight: 700; }
        
        /* واجهة التسويق وقفل التسجيل */
        .marketing-container { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 15px; text-align: center; }
        .marketing-card { background: var(--container-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); max-width: 450px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .fake-video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 15px 0; overflow: hidden; position: relative; border: 2px dashed var(--primary-color); display: flex; align-items: center; justify-content: center; }
        .fake-user { position: absolute; width: 80px; height: 80px; border-radius: 50%; background: #333; animation: pulse 1.5s infinite; }

        .btn-google { background-color: #df4b3b; color: white; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { background-color: #ff5c4c; }
        
        .profile-setup { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; background: var(--chat-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .profile-setup label { font-size: 11px; color: var(--text-muted); text-align: right; display: block; margin-bottom: 2px; }
        .profile-setup input, .profile-setup select { padding: 10px; border-radius: 5px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 13px; width: 100%; }

        /* الواجهة الرئيسية التجاوبية */
        .main-container { display: none; flex: 1; flex-direction: row; height: calc(100vh - 65px); }
        .video-section { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; justify-content: center; align-items: center; position: relative; }
        .videos-grid { display: flex; gap: 15px; width: 100%; max-width: 900px; flex: 1; align-items: center; }
        .video-box { position: relative; flex: 1; aspect-ratio: 4/3; background-color: var(--chat-bg); border-radius: 12px; border: 2px solid var(--border-color); overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { transform: scaleX(-1); }
        .video-label { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 15px; font-size: 11px; z-index: 2; }

        /* 👑 صورة ملف الطرف الآخر المدمجة في زاوية الفيديو */
        .corner-profile { position: absolute; top: 10px; left: 10px; display: flex; align-items: center; gap: 8px; background: rgba(0, 0, 0, 0.7); padding: 5px 10px; border-radius: 20px; border: 1px solid var(--primary-color); backdrop-filter: blur(5px); z-index: 3; display: none; }
        .corner-profile img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .corner-profile span { font-size: 11px; color: #fff; font-weight: bold; }

        /* ✨ شاشة أنيميشن المطابقة السريعة المذهلة */
        .match-intro-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; display: none; transition: opacity 0.3s; }
        .intro-card { text-align: center; animation: zoomIn 0.5s ease-out; }
        .intro-avatar { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--primary-color); box-shadow: 0 0 25px var(--primary-color); object-fit: cover; margin-bottom: 15px; animation: pulse 1.5s infinite; }
        .intro-name { font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .intro-meta { font-size: 14px; color: var(--primary-color); }

        /* أزرار التحكم الديناميكية */
        .controls { display: flex; gap: 10px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .control-btn { border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.2s; color: #000; min-width: 120px; }
        #btnStart { background-color: var(--success-color); }
        #btnStop { background-color: var(--danger-color); color: white; display: none; }
        #btnSwap { background-color: var(--info-color); display: none; }
        .control-btn:disabled { background-color: var(--border-color) !important; color: var(--text-muted) !important; cursor: not-allowed; }

        /* الشات المتجاوب */
        .chat-section { width: 340px; background: var(--container-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .chat-messages { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: var(--chat-bg); }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; font-size: 13px; word-break: break-word; }
        .msg.me { background: var(--primary-color); color: #000; align-self: flex-start; }
        .msg.them { background: var(--border-color); color: var(--text-color); align-self: flex-end; }
        .chat-input-area { padding: 12px; display: flex; gap: 8px; border-top: 1px solid var(--border-color); }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); outline: none; font-size: 13px; }
        .chat-input-area button { background: var(--primary-color); border: none; color: #000; padding: 0 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .user-meta-panel { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-muted); width: 100%; justify-content: center; }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--primary-color); }

        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .chat-section { width: 100%; height: 220px; border-right: none; border-top: 1px solid var(--border-color); }
            .videos-grid { flex-direction: column; gap: 8px; }
            .video-box { width: 100%; }
            .control-btn { padding: 10px 20px; font-size: 14px; min-width: 100px; }
        }
    </style>
</head>
<body>

    <header>
        <h1 id="txtTitle">to-omegle 🚀</h1>
        <button id="themeToggle" style="background:none; border:none; color:var(--text-color); cursor:pointer;">🌓</button>
    </header>

    <!-- 1️⃣ شاشة التسويق والمطابقة الوهمية -->
    <div id="marketingScreen" class="marketing-container">
        <div class="marketing-card">
            <h2 id="txtPromoHead">اكتشف أشخاصاً جدد حول العالم!</h2>
            <div class="fake-video-box" id="fakeBox">
                <div class="fake-user"></div>
                <p style="z-index: 10; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 10px;" id="txtPromoBanner">جاري البحث عن أفراد متصلين الآن...</p>
            </div>
            
            <button class="btn-google" id="btnGoogleLogin">
                <svg style="width:18px; height:18px;" viewBox="0 0 24 24"><path fill="currentColor" d="M21.35,11.1H12v2.7h5.38c-0.24,1.28,-0.96,2.37,-2.04,3.1v2.57h3.29c1.92,-1.77,3.02,-4.38,3.02,-7.37c0,-0.61,-0.05,-1.2,-0.15,-1.73z" color="#fff"/><path fill="currentColor" d="M12,21c2.43,0,4.47,-0.8,5.96,-2.18l-3.29,-2.57c-0.91,0.61,-2.08,0.97,-3.32,0.97c-2.34,0,-4.33,-1.58,-5.03,-3.71H2.92v2.66C4.41,18.11,7.96,21,12,21z" color="#fff"/><path fill="currentColor" d="M6.97,13.51c-0.18,-0.54,-0.28,-1.12,-0.28,-1.71s0.1,-1.17,0.28,-1.71V7.43H2.92C2.33,8.61,2,9.94,2,11.35s0.33,2.74,0.92,3.92l4.05,-3.16z" color="#fff"/><path fill="currentColor" d="M12,5.38c1.32,0,2.5,0.45,3.44,1.35l2.58,-2.58C16.46,2.62,14.43,1.8,12,1.8c-4.04,0,-7.59,2.89,-9.08,6.56l4.05,3.16c0.7,-2.13,2.69,-3.71,5.03,-3.71z" color="#fff"/></svg>
                <span id="txtGoogleBtn">الدخول بقوقل</span>
            </button>

            <!-- استمارة حفظ وتحديث البيانات الدائمة في الفايرستور -->
            <div class="profile-setup">
                <div>
                    <label>الاسم المستعار</label>
                    <input type="text" id="customName" placeholder="اكتب اسمك الحركي...">
                </div>
                <div>
                    <label>العمر</label>
                    <select id="userAge">
                        <option value="18">18</option>
                        <script>for(let i=15; i<=60; i++) { if(i!==18) document.write(`<option value="${i}">${i}</option>`); }</script>
                    </select>
                </div>
                <div>
                    <label>الجنس</label>
                    <select id="userGender">
                        <option value="ذكر">ذكر / Male</option>
                        <option value="أنثى">أنثى / Female</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- 2️⃣ الواجهة الرئيسية الفعّالة -->
    <div id="mainScreen" class="main-container">
        <div class="video-section">
            
            <!-- ✨ طبقة الأنيميشن الترحيبي عند العثور على شخص -->
            <div class="match-intro-overlay" id="matchIntro">
                <div class="intro-card">
                    <img id="introPic" class="intro-avatar" src="" alt="avatar">
                    <div id="introName" class="intro-name">..</div>
                    <div id="introMeta" class="intro-meta">..</div>
                </div>
            </div>

            <div class="videos-grid">
                <div class="video-box">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="video-label" id="lblYou">أنت</div>
                </div>
                <div class="video-box" id="remoteVideoContainer">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="video-label" id="lblThem">الطرف الآخر</div>
                    
                    <!-- 👑 كرت البروفايل المعلق في زاوية فيديو الطرف الآخر -->
                    <div class="corner-profile" id="strangerCornerCard">
                        <img id="cornerPic" src="" alt="">
                        <span id="cornerInfo">..</span>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button id="btnStart" class="control-btn">ابدأ</button>
                <button id="btnSwap" class="control-btn">تبديل</button>
                <button id="btnStop" class="control-btn">توقف</button>
            </div>
            
            <p id="status">..</p>
            
            <div class="user-meta-panel">
                <img id="userImg" class="user-avatar" src="" alt="">
                <span id="profileSummary">..</span>
                <button id="logoutBtn" style="color:var(--danger-color); border:none; background:none; cursor:pointer;">[خروج]</button>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-header" id="txtChatHeader">الدردشة الحية للماتش</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="..." disabled>
                <button id="sendChatBtn" disabled>➔</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, onSnapshot, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXDmGl5T8XX4DXKzv2r8DDp2ts9n4HiOs",
            authDomain: "to-omegle958236.firebaseapp.com",
            projectId: "to-omegle958236",
            storageBucket: "to-omegle958236.firebasestorage.app",
            messagingSenderId: "1058687473096",
            appId: "1:1058687473096:web:52aa3974ec64e04d1f5cfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let localStream = null, myPeerId = null, peer = null, currentUser = null, currentRoomId = null, unsubChat = null, unsubRoomObserver = null, activeCall = null;
        let currentLang = 'ar';
        let intentionalDisconnect = false;

        const langPack = {
            ar: {
                title: "to-omegle 🚀", promoHead: "اكتشف أشخاصاً جدد حول العالم!", promoBanner: "جاري البحث عن أفراد متصلين الآن...",
                googleBtn: "الدخول بقوقل", you: "أنت", them: "الطرف الآخر", start: "ابدأ", swap: "تبديل", stop: "توقف",
                chatHeader: "الدردشة الحية للماتش", placeholder: "اكتب رسالة للطرف الآخر...", statusReady: "جاهز تماماً! اضغط ابدأ للمطابقة.",
                statusSearch: "جاري البحث العشوائي...", statusConnected: "تم الاتصال فيديو وصوت وشات! 🎉", statusWaiting: "في قائمة الانتظار التلقائية...",
                statusStopped: "تم إيقاف الماتش وتصفية الاتصال.", statusLeft: "غادر الطرف الآخر! جاري البحث عن شخص جديد تلقائياً..."
            },
            en: {
                title: "to-omegle 🚀", promoHead: "Discover new people worldwide!", promoBanner: "Searching for active users online...",
                googleBtn: "Sign in with Google", you: "You", them: "Stranger", start: "Start", swap: "Swap", stop: "Stop",
                chatHeader: "Live Match Chat", placeholder: "Type a message to stranger...", statusReady: "Ready! Click Start to match.",
                statusSearch: "Searching for a stranger...", statusConnected: "Connected with video, audio & chat! 🎉", statusWaiting: "Waiting in queue for next user...",
                statusStopped: "Match stopped. Connection cleared.", statusLeft: "Stranger left! Automatically matching you with next person..."
            }
        };

        async function detectLanguage() {
            try {
                const res = await fetch('http://ip-api.com/json/');
                const data = await res.json();
                currentLang = (data.countryCode === 'SA' || data.country === 'Saudi Arabia' || data.timezone.includes('Asia/')) ? 'ar' : 'en';
            } catch (e) { currentLang = 'ar'; }
            applyLanguage();
        }

        function applyLanguage() {
            const p = langPack[currentLang];
            document.getElementById('txtTitle').innerText = p.title;
            document.getElementById('txtPromoHead').innerText = p.promoHead;
            document.getElementById('txtPromoBanner').innerText = p.promoBanner;
            document.getElementById('txtGoogleBtn').innerText = p.googleBtn;
            document.getElementById('lblYou').innerText = p.you;
            document.getElementById('lblThem').innerText = p.them;
            document.getElementById('btnStart').innerText = p.start;
            document.getElementById('btnSwap').innerText = p.swap;
            document.getElementById('btnStop').innerText = p.stop;
            document.getElementById('txtChatHeader').innerText = p.chatHeader;
            document.getElementById('chatInput').placeholder = p.placeholder;
        }

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.documentElement.setAttribute('data-theme', 'light');
        }
        document.getElementById('themeToggle').onclick = () => { document.documentElement.toggleAttribute('data-theme'); };

        document.getElementById('btnGoogleLogin').onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                await signInWithPopup(auth, new GoogleAuthProvider());
                localStorage.setItem('toOmegle_stayLogged', 'true');
            } catch (e) { alert("يتطلب عمل التطبيق تفعيل صلاحيات الكاميرا والصوت."); }
        };

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('toOmegle_stayLogged');
            localStorage.removeItem('active_room_id');
            localStorage.removeItem('active_room_role');
            signOut(auth).then(() => location.reload());
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                const userDocRef = doc(db, 'users', user.uid);
                const userDocSnap = await getDoc(userDocRef);
                
                if (userDocSnap.exists()) {
                    const savedData = userDocSnap.data();
                    document.getElementById('customName').value = savedData.name || user.displayName;
                    document.getElementById('userAge').value = savedData.age || "18";
                    document.getElementById('userGender').value = savedData.gender || "ذكر";
                } else {
                    document.getElementById('customName').value = user.displayName;
                }
                
                document.getElementById('userImg').src = user.photoURL;
                document.getElementById('marketingScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'flex';
                
                if (!localStream) {
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                        document.getElementById('localVideo').srcObject = localStream;
                    } catch(e) { console.error(e); }
                }
                initPeerEngine();
            } else {
                document.getElementById('marketingScreen').style.display = 'flex';
                document.getElementById('mainScreen').style.display = 'none';
            }
        });

        function initPeerEngine() {
            peer = new Peer('peer-omegle-' + currentUser.uid);
            peer.on('open', (id) => {
                myPeerId = id;
                document.getElementById('status').innerText = langPack[currentLang].statusReady;
                saveAndRefreshProfile();
                
                // 🔄 فحص المحاذاة المستمرة بعد إعادة تحديث الصفحة تلقائياً
                checkSavedSessionAfterRefresh();
            });

            peer.on('call', (call) => {
                intentionalDisconnect = false;
                activeCall = call;
                call.answer(localStream);
                
                const strangerInfo = call.options.metadata?.profile || { name: "Stranger", age: "??", gender: "??", photo: "" };
                triggerMatchAnimation(strangerInfo);

                call.on('stream', (remoteStream) => {
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                    document.getElementById('status').innerText = langPack[currentLang].statusConnected;
                    toggleControlUI(true);
                });
                
                currentRoomId = call.options.metadata?.roomId || currentUser.uid;
                localStorage.setItem('active_room_id', currentRoomId);
                localStorage.setItem('active_room_role', 'receiver');
                
                startChatSystem(currentRoomId);
                observeRoomStatus(currentRoomId);
            });
        }

        // دالة تفحص السيسشن القديم لو مسجل محلياً عشان ترجع نفس الشخص فوراً
        async function checkSavedSessionAfterRefresh() {
            const savedRoomId = localStorage.getItem('active_room_id');
            const savedRole = localStorage.getItem('active_room_role');
            
            if (savedRoomId && savedRole) {
                const roomDoc = await getDoc(doc(db, 'omegle_active_rooms', savedRoomId));
                if (roomDoc.exists()) {
                    const roomData = roomDoc.data();
                    if (roomData.status === 'connected') {
                        currentRoomId = savedRoomId;
                        intentionalDisconnect = false;
                        
                        if (savedRole === 'creator') {
                            // إذا كنت منشئ الغرفة، انتظر اتصال الطرف الآخر مجدداً أو اتصل بـ Peer الخاص به
                            triggerMatchAnimation(roomData.joinedProfile);
                            if (roomData.peerId) {
                                const call = peer.call(roomData.peerId, localStream, { 
                                    metadata: { roomId: currentRoomId, profile: roomData.creatorProfile } 
                                });
                                activeCall = call;
                                call.on('stream', (remoteStream) => {
                                    document.getElementById('remoteVideo').srcObject = remoteStream;
                                    document.getElementById('status').innerText = langPack[currentLang].statusConnected;
                                    toggleControlUI(true);
                                });
                            }
                        } else {
                            // إذا كنت المنضم، اتصل بمنشئ الغرفة فوراً لإعادة تفعيل الكاميرات
                            triggerMatchAnimation(roomData.creatorProfile);
                            const call = peer.call('peer-omegle-' + roomData.creatorUid, localStream, { 
                                metadata: { roomId: currentRoomId, profile: roomData.joinedProfile } 
                            });
                            activeCall = call;
                            call.on('stream', (remoteStream) => {
                                document.getElementById('remoteVideo').srcObject = remoteStream;
                                document.getElementById('status').innerText = langPack[currentLang].statusConnected;
                                toggleControlUI(true);
                            });
                        }
                        startChatSystem(currentRoomId);
                        observeRoomStatus(currentRoomId);
                        return;
                    }
                }
            }
            // إذا لم يكن هناك جلسة مخزنة أو كانت الغرفة مغلقة، امسح الكاش
            localStorage.removeItem('active_room_id');
            localStorage.removeItem('active_room_role');
        }

        async function saveAndRefreshProfile() {
            if (!currentUser) return {};
            const profileData = {
                uid: currentUser.uid,
                name: document.getElementById('customName').value.trim() || currentUser.displayName,
                age: document.getElementById('userAge').value,
                gender: document.getElementById('userGender').value,
                photo: currentUser.photoURL,
                updatedAt: Date.now()
            };
            await setDoc(doc(db, 'users', currentUser.uid), profileData, { merge: true });
            document.getElementById('profileSummary').innerText = `${profileData.name} (${profileData.age}, ${profileData.gender})`;
            return profileData;
        }

        function triggerMatchAnimation(info) {
            const introOverlay = document.getElementById('matchIntro');
            const cornerCard = document.getElementById('strangerCornerCard');
            
            document.getElementById('introPic').src = info.photo || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_120dp.png';
            document.getElementById('introName').innerText = info.name;
            document.getElementById('introMeta').innerText = `${info.gender}، ${info.age} عاماً`;
            
            document.getElementById('cornerPic').src = info.photo || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_120dp.png';
            document.getElementById('cornerInfo').innerText = `${info.name} (${info.age})`;

            introOverlay.style.display = 'flex';
            cornerCard.style.display = 'none';

            setTimeout(() => {
                introOverlay.style.opacity = '0';
                setTimeout(() => { 
                    introOverlay.style.display = 'none'; 
                    introOverlay.style.opacity = '1';
                    cornerCard.style.display = 'flex';
                }, 300);
            }, 2200);
        }

        async function triggerMatchmaking() {
            intentionalDisconnect = true; 
            await clearPreviousConnection();
            intentionalDisconnect = false;

            document.getElementById('status').innerText = langPack[currentLang].statusSearch;
            const myLatestProfile = await saveAndRefreshProfile();

            const roomsRef = collection(db, 'omegle_active_rooms');
            const q = query(roomsRef, where('status', '==', 'waiting'));
            const snapshot = await getDocs(q);
            
            let targetRoom = null;
            snapshot.forEach(doc => {
                if (!targetRoom && doc.data().creatorUid !== currentUser.uid) {
                    targetRoom = doc;
                }
            });

            if (targetRoom) {
                currentRoomId = targetRoom.id;
                const roomData = targetRoom.data();
                
                localStorage.setItem('active_room_id', currentRoomId);
                localStorage.setItem('active_room_role', 'receiver');

                await setDoc(doc(db, 'omegle_active_rooms', currentRoomId), { 
                    status: 'connected', 
                    peerId: myPeerId,
                    joinedProfile: myLatestProfile
                }, { merge: true });

                const call = peer.call(roomData.peerId, localStream, { 
                    metadata: { roomId: currentRoomId, profile: myLatestProfile } 
                });
                activeCall = call;
                
                triggerMatchAnimation(roomData.creatorProfile);

                call.on('stream', (remoteStream) => {
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                    document.getElementById('status').innerText = langPack[currentLang].statusConnected;
                    toggleControlUI(true);
                });
                startChatSystem(currentRoomId);
                observeRoomStatus(currentRoomId);
            } else {
                currentRoomId = 'room-' + currentUser.uid + '-' + Date.now();
                localStorage.setItem('active_room_id', currentRoomId);
                localStorage.setItem('active_room_role', 'creator');

                await setDoc(doc(db, 'omegle_active_rooms', currentRoomId), {
                    peerId: myPeerId, 
                    status: 'waiting', 
                    creatorUid: currentUser.uid,
                    creatorProfile: myLatestProfile
                });

                document.getElementById('status').innerText = langPack[currentLang].statusWaiting;

                const unsubRoom = onSnapshot(doc(db, 'omegle_active_rooms', currentRoomId), (docSnap) => {
                    const data = docSnap.data();
                    if (data && data.status === 'connected') {
                        triggerMatchAnimation(data.joinedProfile);
                        startChatSystem(currentRoomId);
                        toggleControlUI(true);
                        observeRoomStatus(currentRoomId);
                        unsubRoom();
                    }
                });
            }
        }

        function observeRoomStatus(roomId) {
            if (unsubRoomObserver) unsubRoomObserver();
            unsubRoomObserver = onSnapshot(doc(db, 'omegle_active_rooms', roomId), (docSnap) => {
                const data = docSnap.data();
                if ((!docSnap.exists() || (data && data.status === 'disconnected')) && !intentionalDisconnect) {
                    document.getElementById('status').innerText = langPack[currentLang].statusLeft;
                    if (unsubRoomObserver) { unsubRoomObserver(); unsubRoomObserver = null; }
                    localStorage.removeItem('active_room_id');
                    localStorage.removeItem('active_room_role');
                    setTimeout(() => { triggerMatchmaking(); }, 1500);
                }
            });
        }

        async function clearPreviousConnection() {
            if (activeCall) { activeCall.close(); activeCall = null; }
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('chatInput').disabled = true;
            document.getElementById('sendChatBtn').disabled = true;
            document.getElementById('strangerCornerCard').style.display = 'none';
            
            if (unsubChat) { unsubChat(); unsubChat = null; }
            if (unsubRoomObserver) { unsubRoomObserver(); unsubRoomObserver = null; }
            
            if (currentRoomId) {
                try { 
                    await updateDoc(doc(db, 'omegle_active_rooms', currentRoomId), { status: 'disconnected' });
                    await deleteDoc(doc(db, 'omegle_active_rooms', currentRoomId)); 
                } catch(e){}
                currentRoomId = null;
            }
            localStorage.removeItem('active_room_id');
            localStorage.removeItem('active_room_role');
        }

        function toggleControlUI(isConnected) {
            if (isConnected) {
                document.getElementById('btnStart').style.display = 'none';
                document.getElementById('btnSwap').style.display = 'inline-block';
                document.getElementById('btnStop').style.display = 'inline-block';
            } else {
                document.getElementById('btnStart').style.display = 'inline-block';
                document.getElementById('btnSwap').style.display = 'none';
                document.getElementById('btnStop').style.display = 'none';
            }
        }

        document.getElementById('btnStart').onclick = () => triggerMatchmaking();
        document.getElementById('btnSwap').onclick = () => triggerMatchmaking();
        document.getElementById('btnStop').onclick = () => {
            intentionalDisconnect = true;
            clearPreviousConnection();
            toggleControlUI(false);
            document.getElementById('status').innerText = langPack[currentLang].statusStopped;
        };

        function startChatSystem(roomId) {
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendChatBtn').disabled = false;
            
            const msgRef = collection(db, 'omegle_active_rooms', roomId, 'messages');
            unsubChat = onSnapshot(msgRef, (snap) => {
                document.getElementById('chatMessages').innerHTML = '';
                let arr = [];
                snap.forEach(d => arr.push(d.data()));
                arr.sort((a,b) => a.time - b.time);
                arr.forEach(m => {
                    const box = document.createElement('div');
                    box.classList.add('msg');
                    box.classList.add(m.sender === currentUser.uid ? 'me' : 'them');
                    box.innerText = m.text;
                    document.getElementById('chatMessages').appendChild(box);
                });
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            });
        }

        document.getElementById('sendChatBtn').onclick = async () => {
            const text = document.getElementById('chatInput').value.trim();
            if (text && currentRoomId) {
                document.getElementById('chatInput').value = '';
                await addDoc(collection(db, 'omegle_active_rooms', currentRoomId, 'messages'), {
                    text: text, sender: currentUser.uid, time: Date.now()
                });
            }
        };
        document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('sendChatBtn').click(); });

        detectLanguage();
    </script>
</body>
</html>
